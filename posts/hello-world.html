<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hello world — bobbay.com</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">bobby@bobbay.com ~/posts</span>
    </div>
    <div class="terminal-body">
      <div class="line">
        <span class="prompt">$</span> cat hello-world.md
      </div>
      <div class="output post-content">
        <h1># hello world</h1>
        <p><em>2026-03-25</em></p>
        <p>
          this is the first post. if you're reading this, the blog works.
        </p>
        <p>
          built with plain html, hosted on github pages, styled like a terminal because that's where i live anyway.
        </p>
        <p>
          more posts soon. or not. we'll see.
        </p>
      </div>
      <div class="line">
        <span class="prompt">$</span> <a href="../index.html" class="back-link">cd ..</a>
      </div>
    </div>
  </div>
</body>
</html>
